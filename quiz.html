<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Battle - Quiz</title>
  <link rel="stylesheet" href="quiz.css" />
</head>

<body>
  <div class="page">
    <div class="quiz-layout">
      <header class="top-bar">
        <div class="top-left">
          <span class="badge">Quiz 1 / 3</span>
          <span class="badge">Thème : Antiquité</span>
        </div>

        <div class="timer-box">
          <p>Temps restant</p>
          <div class="timer-bar">
            <div class="timer-fill"></div>
          </div>
          <span>10 s</span>
        </div>
      </header>

      <section class="players">
        <div class="player-card">
          <div class="avatar">👤</div>
          <h2>Joueur 1</h2>
          <p class="player-name">Oumaima</p>
          <p class="score">Score : 120</p>
        </div>

        <div class="versus">VS</div>

        <div class="player-card">
          <div class="avatar">👤</div>
          <h2>Joueur 2</h2>
          <p class="player-name">Ali</p>
          <p class="score">Score : 95</p>
        </div>
      </section>

      <main class="quiz-card">
        <p class="question-number">Question 1 / 8</p>

        <h1 class="question">
          Quel pharaon a fait construire la Grande Pyramide de Gizeh ?
        </h1>

        <div class="answers">
          <button class="answer-btn" type="button">A. Khéops</button>
          <button class="answer-btn" type="button">B. Ramsès II</button>
          <button class="answer-btn" type="button">C. Thoutmosis III</button>
        </div>

        <div class="action-box">
          <button class="next-btn" type="button">Question suivante</button>
        </div>
      </main>
    </div>
  </div>
</body>

</html>
