<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Battle - Accueil</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="page">
    <div class="card">
      <header class="card-header">
        <h1>Quiz Battle</h1>
        <p>
          Créez une room ou rejoignez une partie pour affronter un autre joueur
          sur 3 quiz.
        </p>
      </header>

      <form class="form">
        <div class="form-group">
          <label for="player-name">Nom du joueur</label>
          <input type="text" id="player-name" placeholder="Entrez votre nom" />
        </div>

        <div class="form-group">
          <label for="player-age">Âge</label>
          <input type="number" id="player-age" placeholder="Entrez votre âge" min="10" max="100" />
        </div>

        <div class="form-group">
          <label for="language">Langue</label>
          <select id="language">
            <option value="">Choisir une langue</option>
            <option value="fr">Français</option>
            <option value="en">English</option>
            <option value="ar">العربية</option>
          </select>
        </div>

        <div class="form-group">
          <label for="room-code">Code de la room</label>
          <input type="text" id="room-code" placeholder="Exemple : ROOM123" />
        </div>

        <div class="button-group">
          <button type="button" class="btn btn-primary">Créer une room</button>
          <button type="button" class="btn btn-secondary">Rejoindre une room</button>
        </div>
      </form>

      <section class="rules">
        <h2>Règles du jeu</h2>
        <ul>
          <li>2 joueurs par room</li>
          <li>3 quiz par partie</li>
          <li>8 questions aléatoires par quiz</li>
          <li>Le premier joueur à gagner 2 quiz remporte la partie</li>
        </ul>
      </section>
    </div>
  </div>
</body>

</html>
